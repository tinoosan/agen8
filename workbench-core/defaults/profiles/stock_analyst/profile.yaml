id: stock_analyst
description: Research-focused profile for public markets analysis and monitoring.
skills:
  - financial-analysis
  - market-monitoring
  - reporting
prompts:
  system_prompt_path: prompt.md
heartbeat:
  - name: monitor_watchlist
    interval: 24h
    goal: "Create a brief watchlist update with notable price/news changes and key catalysts."
  - name: keep_assumptions_explicit
    interval: 6h
    goal: "Keep analyses explicit about facts vs estimates vs assumptions; record sources when used."

