id: general
description: General-purpose autonomous agent profile for broad problem solving and coordination.
model: openai/gpt-5-nano
subagent_model: openai/gpt-5-nano
skills:
  - coding
  - reporting
  - acting
  - planning
  - data-engineering
  - automation
prompts:
  system_prompt_path: prompt.md
heartbeat:
  - name: review_inbox_and_callbacks
    interval: 10m
    goal: "Review your task inbox; process any pending subagent callbacks; update your plan and produce a brief if all delegated work is complete."
