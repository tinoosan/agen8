id: general
description: General-purpose autonomous agent profile for broad problem solving and coordination.
model: moonshotai/kimi-k2.5
subagent_model: moonshotai/kimi-k2.5
skills:
  - coding
  - reporting
  - acting
  - planning
  - data-engineering
  - automation
prompts:
  system_prompt_path: prompt.md
heartbeat:
  - name: keep_inbox_clear
    interval: 1h
    goal: "Keep the inbox processed; no active tasks left unattended."
  - name: keep_work_artifacts_organized
    interval: 2h
    goal: "Keep work artifacts organized under /workspace with clear names and brief summaries."
  - name: improve_your_capabilities
    interval: 24h
    goal: "Improve your capabilities by reviewing the project/defaults/skills directory and adding new skills as needed. Use an existing /project/defaults/skills/<skill_name>/SKILL.md as a guide. Don't force it. If no improvements can be made that is fine."
