id: stock_researcher
description: Focused profile for equity and company-level stock research.
model: openai/gpt-5-mini
subagent_model: openai/gpt-5-nano
code_exec_only: true
allowed_tools:
  - fs_list
  - fs_read
  - fs_search
  - fs_write
  - fs_append
  - fs_edit
  - http_fetch
  - browser
  - task_create
  - task_review
skills:
  - financial-analysis
  - market-monitoring
  - reporting
  - obsidian-cli
prompts:
  system_prompt_path: prompt.md
heartbeat:
  - name: refresh-watchlist
    interval: 8h
    goal: "Refresh watchlist names with notable price, estimate, or catalyst changes."
