id: consulting_firm
description: Strategy consulting team that researches problems, builds analyses, and delivers actionable client recommendations.
team:
  model: moonshotai/kimi-k2.5
  roles:
    - name: managing-partner
      coordinator: true
      model: moonshotai/kimi-k2.5
      allowed_tools:
        - fs_list
        - fs_read
        - fs_search
        - fs_write
        - fs_append
        - fs_edit
        - http_fetch
        - browser
        - task_create
        - task_review
      description: Scopes engagements, delegates workstreams, synthesizes findings, and drives delivery of client recommendations.
      prompts:
        system_prompt_path: managing-partner-prompt.md
      skills:
        - project-management
        - reporting
      heartbeat:
        - name: coordinator-check-in
          interval: 10m
          goal: "Review team task board, unblock stalled work, and delegate next steps to all required roles."
        - name: coordinator-daily-brief
          interval: 24h
          goal: "Produce a consolidated engagement progress brief from completed role outputs."

    - name: strategy-analyst
      model: moonshotai/kimi-k2.5
      allowed_tools:
        - fs_list
        - fs_read
        - fs_search
        - fs_write
        - fs_append
        - fs_edit
        - http_fetch
        - browser
        - task_create
      description: Performs strategic analysis — competitive positioning, market sizing, and business case evaluation.
      prompts:
        system_prompt_path: strategy-analyst-prompt.md
      skills:
        - planning
        - financial-analysis
        - reporting

    - name: market-researcher
      model: moonshotai/kimi-k2.5
      allowed_tools:
        - fs_list
        - fs_read
        - fs_search
        - fs_write
        - fs_append
        - fs_edit
        - http_fetch
        - browser
        - task_create
      description: Conducts primary and secondary market research to inform strategic recommendations.
      prompts:
        system_prompt_path: market-researcher-prompt.md
      skills:
        - hybrid-web
        - market-monitoring
        - planning

    - name: data-analyst
      model: moonshotai/kimi-k2.5
      allowed_tools:
        - fs_list
        - fs_read
        - fs_search
        - fs_write
        - fs_append
        - fs_edit
        - fs_patch
        - shell_exec
        - http_fetch
        - browser
        - task_create
      description: Crunches numbers, builds models, and turns raw data into insights that support recommendations.
      prompts:
        system_prompt_path: data-analyst-prompt.md
      skills:
        - data-engineering
        - planning
        - automation

    - name: deliverable-writer
      model: moonshotai/kimi-k2.5
      allowed_tools:
        - fs_list
        - fs_read
        - fs_search
        - fs_write
        - fs_append
        - fs_edit
        - http_fetch
        - task_create
      description: Produces polished strategy decks, memos, and executive presentations.
      prompts:
        system_prompt_path: deliverable-writer-prompt.md
      skills:
        - reporting
        - planning

    - name: industry-specialist
      model: moonshotai/kimi-k2.5
      allowed_tools:
        - fs_list
        - fs_read
        - fs_search
        - fs_write
        - fs_append
        - fs_edit
        - http_fetch
        - browser
        - task_create
      description: Provides deep domain expertise on specific industries, trends, and regulatory environments.
      prompts:
        system_prompt_path: industry-specialist-prompt.md
      skills:
        - hybrid-web
        - planning
        - reporting
