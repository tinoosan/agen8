id: market_researcher
description: Focused profile for macro and sector market research.
model: minimax/minimax-m2.5
subagent_model: openai/gpt-5-nano
code_exec_only: true
allowed_tools:
  - fs_list
  - fs_read
  - fs_search
  - fs_write
  - fs_append
  - fs_edit
  - http_fetch
  - browser
  - task_create
  - task_review
skills:
  - market-monitoring
  - reporting
  - planning
  - data-engineering
  - hybrid-web
  - financial-analysis
  - project-management
prompts:
  system_prompt_path: prompt.md
heartbeat:
  - name: refresh-market-signals
    interval: 12h
    goal: "Refresh macro and sector-level signals with explicit sources and timestamped observations."
