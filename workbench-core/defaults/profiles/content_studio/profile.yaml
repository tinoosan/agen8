id: content_studio
description: Content production team that researches, writes, optimizes, and distributes content at scale.
team:
  model: openai/gpt-5.1-codex-mini
  roles:
    - name: editor-in-chief
      coordinator: true
      model: openai/gpt-5.1-codex-mini
      code_exec_only: true
      allowed_tools:
        - fs_list
        - fs_read
        - fs_search
        - fs_write
        - fs_append
        - fs_edit
        - http_fetch
        - browser
        - task_create
        - task_review
      description: Owns the editorial calendar, assigns stories, reviews quality, and drives publishing cadence.
      prompts:
        system_prompt_path: editor-in-chief-prompt.md
      skills:
        - project-management
        - reporting
        - obsidian-cli
      heartbeat:
        - name: coordinator-check-in
          interval: 10m
          goal: "Review team task board, unblock stalled work, and delegate next steps to all required roles."
        - name: coordinator-daily-brief
          interval: 24h
          goal: "Produce a consolidated content pipeline brief from completed role outputs."

    - name: writer
      model: openai/gpt-5.1-codex-mini
      code_exec_only: true
      allowed_tools:
        - fs_list
        - fs_read
        - fs_search
        - fs_write
        - fs_append
        - fs_edit
        - http_fetch
      description: Produces long-form articles, blog posts, newsletters, and copy.
      prompts:
        system_prompt_path: writer-prompt.md
      skills:
        - planning
        - reporting
        - obsidian-cli

    - name: researcher
      model: openai/gpt-5.1-codex-mini
      code_exec_only: true
      allowed_tools:
        - fs_list
        - fs_read
        - fs_search
        - fs_write
        - fs_append
        - fs_edit
        - http_fetch
        - browser
      description: Investigates topics, gathers data, and produces fact-checked source briefs for writers.
      prompts:
        system_prompt_path: researcher-prompt.md
      skills:
        - planning
        - hybrid-web
        - market-monitoring
        - obsidian-cli

    - name: distribution-strategist
      model: openai/gpt-5.1-codex-mini
      code_exec_only: true
      allowed_tools:
        - fs_list
        - fs_read
        - fs_search
        - fs_write
        - fs_append
        - fs_edit
        - http_fetch
        - browser
      description: Plans and executes content distribution across channels for maximum reach.
      prompts:
        system_prompt_path: distribution-strategist-prompt.md
      skills:
        - planning
        - automation
        - market-monitoring
        - obsidian-cli

    - name: seo-specialist
      model: openai/gpt-5.1-codex-mini
      code_exec_only: true
      allowed_tools:
        - fs_list
        - fs_read
        - fs_search
        - fs_write
        - fs_append
        - fs_edit
        - http_fetch
        - browser
      description: Optimizes content for search engines — keyword research, on-page SEO, and performance tracking.
      prompts:
        system_prompt_path: seo-specialist-prompt.md
      skills:
        - planning
        - hybrid-web
        - automation
        - obsidian-cli

    - name: social-media-manager
      model: openai/gpt-5.1-codex-mini
      code_exec_only: true
      allowed_tools:
        - fs_list
        - fs_read
        - fs_search
        - fs_write
        - fs_append
        - fs_edit
        - http_fetch
        - browser
      description: Creates social content, plans posting schedules, and tracks engagement metrics.
      prompts:
        system_prompt_path: social-media-manager-prompt.md
      skills:
        - planning
        - automation
        - reporting
        - obsidian-cli
