id: business_automation_team
description: Multi-role business automation team for workflow analysis, integrations, and data pipelines.
team:
  model: moonshotai/kimi-k2.5
  roles:
    - name: ops-coordinator
      coordinator: true
      description: Breaks down automation goals, delegates to specialists, and tracks delivery.
      prompts:
        system_prompt_path: ops-coordinator-prompt.md
      skills:
        - project_management
        - reporting
      heartbeat:
        - name: coordinator-check-in
          interval: 10m
          goal: "Review team task board, unblock stalled work, and delegate next steps to all required roles."
        - name: coordinator-daily-brief
          interval: 24h
          goal: "Produce a consolidated progress brief on automation deliverables from completed role outputs."

    - name: process-analyst
      description: Analyzes workflows, identifies automation opportunities, and designs optimized processes.
      prompts:
        system_prompt_path: process-analyst-prompt.md
      skills:
        - planning
        - automation
        - hybrid_web

    - name: integration-engineer
      description: Builds integrations, scripts, and API connections to automate business operations.
      prompts:
        system_prompt_path: integration-engineer-prompt.md
      skills:
        - coding
        - automation
        - acting

    - name: data-ops
      description: Designs and implements data pipelines, ETL processes, and data quality checks.
      prompts:
        system_prompt_path: data-ops-prompt.md
      skills:
        - data_engineering
        - automation
        - planning
