id: software_dev
description: Software engineering profile focused on building, debugging, testing, and documentation.
skills:
  - coding
  - reporting
prompts:
  system_prompt_path: prompt.md
heartbeat:
  - name: keep_build_green
    interval: 12h
    goal: "Keep tests/build passing for the changed scope, or explain failures with a mitigation plan."
  - name: keep_changes_minimal
    interval: 6h
    goal: "Keep changes scoped to the request, with clear reasoning and validation."

