id: dev_team
description: Software development team that ships products end-to-end — scoping, design, engineering, testing, and deployment.
team:
  model: moonshotai/kimi-k2.5
  roles:
    - name: product-manager
      coordinator: true
      model: moonshotai/kimi-k2.5
      subagent_model: gpt-5-nano
      code_exec_only: true
      allowed_tools:
        - http_fetch
        - browser
        - task_create
        - task_review
      description: Owns the product roadmap, scopes features, delegates engineering work, and drives releases.
      prompts:
        system_prompt_path: product-manager-prompt.md
      skills:
        - project-management
        - reporting
      heartbeat:
        - name: coordinator-check-in
          interval: 10m
          goal: "Review team task board, unblock stalled work, and delegate next steps to all required roles."
        - name: coordinator-daily-brief
          interval: 24h
          goal: "Produce a consolidated sprint progress brief from completed role outputs."

    - name: backend-engineer
      model: moonshotai/kimi-k2.5
      code_exec_only: true
      allowed_tools:
        - shell_exec
        - http_fetch
        - browser
        - trace_run
      description: Designs APIs, data models, and server-side logic.
      prompts:
        system_prompt_path: backend-engineer-prompt.md
      skills:
        - coding
        - planning
        - data-engineering

    - name: frontend-engineer
      model: moonshotai/kimi-k2.5
      code_exec_only: true
      allowed_tools:
        - shell_exec
        - http_fetch
        - browser
        - trace_run
      description: Builds user interfaces, client-side logic, and user-facing features.
      prompts:
        system_prompt_path: frontend-engineer-prompt.md
      skills:
        - coding
        - planning

    - name: qa-engineer
      model: moonshotai/kimi-k2.5
      reviewer: true
      code_exec_only: true
      allowed_tools:
        - shell_exec
        - http_fetch
        - browser
        - trace_run
        - task_review
        - task_create
      description: Writes tests, finds bugs, validates features against acceptance criteria. Reviews delegated work and provides quality feedback.
      prompts:
        system_prompt_path: qa-engineer-prompt.md
      skills:
        - coding
        - planning
        - automation

    - name: devops-engineer
      model: moonshotai/kimi-k2.5
      code_exec_only: true
      allowed_tools:
        - shell_exec
        - http_fetch
        - browser
        - trace_run
      description: Manages infrastructure, CI/CD pipelines, deployments, and monitoring.
      prompts:
        system_prompt_path: devops-engineer-prompt.md
      skills:
        - coding
        - automation
        - planning

    - name: ux-researcher
      model: moonshotai/kimi-k2.5
      code_exec_only: true
      allowed_tools:
        - http_fetch
        - browser
      description: Researches user needs, evaluates usability, and informs product decisions with evidence.
      prompts:
        system_prompt_path: ux-researcher-prompt.md
      skills:
        - planning
        - hybrid-web
        - reporting
