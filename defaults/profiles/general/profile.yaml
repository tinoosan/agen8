id: general
description: General-purpose autonomous agent profile for broad problem solving and coordination.
team:
  model: moonshotai/kimi-k2.5
  roles:
    - name: General Agent
      coordinator: true
      allowSubagents: true
      model: moonshotai/kimi-k2.5
      subagentModel: moonshotai/kimi-k2.5
      codeExecOnly: true
      allowedTools:
        - pipe
        - shell_exec
        - http_fetch
        - task_create
        - task_review
        - obsidian
      description: General-purpose autonomous agent profile for broad problem solving and coordination.
      prompts:
        systemPromptPath: prompt.md
      skills:
        - coding
        - reporting
        - acting
        - planning
        - data-engineering
        - project-management
        - financial-analysis
        - market-monitoring
        - automation
      heartbeat:
        enabled: false
        jobs:
          - name: review_your_notes
            interval: 10m
            goal: "Review your notes and form connections meaningful connections between notes."
