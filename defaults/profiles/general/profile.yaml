id: general
description: General-purpose autonomous agent profile for broad problem solving and coordination.
model: openai/gpt-5-nano
subagent_model: openai/gpt-5-nano
code_exec_only: true
allowed_tools:
  - fs_list
  - fs_read
  - fs_search
  - fs_write
  - fs_append
  - fs_edit
  - fs_patch
  - shell_exec
  - http_fetch
  - browser
  - task_create
  - task_review
skills:
  - coding
  - reporting
  - acting
  - planning
  - data-engineering
  - project-management
  - financial-analysis
  - market-monitoring
  - automation
prompts:
  system_prompt_path: prompt.md
heartbeat:
  - name: review_your_knowledge
    interval: 10m
    goal: "Review your knowledge graph and form connections meaningful connections between notes."
