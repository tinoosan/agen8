id: general
description: General-purpose autonomous agent profile for broad problem solving and coordination.
team:
  model: moonshotai/kimi-k2.5
  reviewer:
    enabled: true
    name: reviewer
    description: Dedicated review runtime for team-level batch callback reviews.
    prompts:
      system_prompt: |
        You are the dedicated reviewer for this team.

        Review synthetic batch callback tasks only.
        Decide approve/retry/escalate per item with task_review and provide concise, actionable reasoning.
        After finishing a batch review, hand off to the coordinator via the system handoff task.
    code_exec_only: true
    allowed_tools:
      - task_review
      - task_create
      - fs_list
      - fs_read
      - fs_search
    skills:
      - reviewing
  roles:
    - name: General Agent
      coordinator: true
      allow_subagents: true
      model: moonshotai/kimi-k2.5
      subagent_model: gpt-5-nano
      code_exec_only: true
      allowed_tools:
        - shell_exec
        - http_fetch
        - task_create
        - task_review
        - obsidian
      description: General-purpose autonomous agent profile for broad problem solving and coordination.
      prompts:
        system_prompt_path: prompt.md
      skills:
        - coding
        - reporting
        - acting
        - planning
        - data-engineering
        - project-management
        - financial-analysis
        - market-monitoring
        - automation
      heartbeat:
        enabled: false
        jobs:
          - name: review_your_notes
            interval: 10m
            goal: "Review your notes and form connections meaningful connections between notes."
