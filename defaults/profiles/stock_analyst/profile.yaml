id: stock_analyst
description: Research-focused profile for public markets analysis and monitoring.
team:
  model: moonshotai/kimi-k2.5
  reviewer:
    roleRef: ../base/roles/reviewer.yaml
    enabled: true
  roles:
    - name: Stock Analyst
      coordinator: true
      allowSubagents: true
      model: moonshotai/kimi-k2.5
      subagentModel: moonshotai/kimi-k2.5
      codeExecOnly: true
      allowedTools:
        - pipe
        - http_fetch
        - browser
        - task_create
        - task_review
      description: Research-focused profile for public markets analysis and monitoring.
      prompts:
        systemPromptPath: prompt.md
      skills:
        - financial-analysis
        - market-monitoring
        - reporting
      heartbeat:
        - name: monitor_watchlist
          interval: 24h
          goal: "Create a brief watchlist update with notable price/news changes and key catalysts."
        - name: keep_assumptions_explicit
          interval: 6h
          goal: "Keep analyses explicit about facts vs estimates vs assumptions; record sources when used."
