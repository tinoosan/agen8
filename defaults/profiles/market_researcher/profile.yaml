id: market_researcher
name: Market Researcher
description: Focused profile for macro and sector market research.
model: openai/gpt-5.1-codex-mini
subagent_model: openai/gpt-5.1-codex-mini
code_exec_only: true
allowed_tools:
  - http_fetch
  - browser
  - task_create
  - task_review
skills:
  - market-monitoring
  - reporting
  - planning
  - data-engineering
  - hybrid-web
  - financial-analysis
  - project-management
prompts:
  system_prompt_path: prompt.md
heartbeat:
  - name: refresh-market-signals
    interval: 12h
    goal: "Refresh macro and sector-level signals with explicit sources and timestamped observations."
