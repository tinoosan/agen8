id: market_researcher
description: Focused profile for macro and sector market research.
team:
  model: moonshotai/kimi-k2.5
  roles:
    - name: Market Researcher
      coordinator: true
      allow_subagents: true
      model: moonshotai/kimi-k2.5
      subagent_model: gpt-5-nano
      code_exec_only: true
      allowed_tools:
        - http_fetch
        - browser
        - task_create
        - task_review
      description: Focused profile for macro and sector market research.
      prompts:
        system_prompt_path: prompt.md
      skills:
        - market-monitoring
        - reporting
        - planning
        - data-engineering
        - hybrid-web
        - financial-analysis
        - project-management
      heartbeat:
        - name: refresh-market-signals
          interval: 12h
          goal: "Refresh macro and sector-level signals with explicit sources and timestamped observations."
