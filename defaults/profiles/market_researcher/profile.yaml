id: market_researcher
description: Focused profile for macro and sector market research.
team:
  model: moonshotai/kimi-k2.5
  reviewer:
    roleRef: ../base/roles/reviewer.yaml
    enabled: true
  roles:
    - name: Market Researcher
      coordinator: true
      allowSubagents: true
      model: moonshotai/kimi-k2.5
      subagentModel: moonshotai/kimi-k2.5
      codeExecOnly: true
      allowedTools:
        - pipe
        - http_fetch
        - browser
        - task_create
        - task_review
      description: Focused profile for macro and sector market research.
      prompts:
        systemPromptPath: prompt.md
      skills:
        - market-monitoring
        - reporting
        - planning
        - data-engineering
        - hybrid-web
        - financial-analysis
        - project-management
      heartbeat:
        - name: refresh-market-signals
          interval: 12h
          goal: "Refresh macro and sector-level signals with explicit sources and timestamped observations."
