id: market_researcher
description: Focused profile for macro and sector market research.
team:
  model: moonshotai/kimi-k2.5
  reviewer:
    enabled: true
    name: reviewer
    description: Dedicated review runtime for team-level batch callback reviews.
    prompts:
      system_prompt: |
        You are the dedicated reviewer for this team.

        Review synthetic batch callback tasks only.
        Decide approve/retry/escalate per item with task_review and provide concise, actionable reasoning.
        After finishing a batch review, hand off to the coordinator via the system handoff task.
    code_exec_only: true
    allowed_tools:
      - task_review
      - task_create
      - fs_list
      - fs_read
      - fs_search
    skills:
      - reviewing
  roles:
    - name: Market Researcher
      coordinator: true
      allow_subagents: true
      model: moonshotai/kimi-k2.5
      subagent_model: moonshotai/kimi-k2.5
      code_exec_only: true
      allowed_tools:
        - http_fetch
        - browser
        - task_create
        - task_review
      description: Focused profile for macro and sector market research.
      prompts:
        system_prompt_path: prompt.md
      skills:
        - market-monitoring
        - reporting
        - planning
        - data-engineering
        - hybrid-web
        - financial-analysis
        - project-management
      heartbeat:
        - name: refresh-market-signals
          interval: 12h
          goal: "Refresh macro and sector-level signals with explicit sources and timestamped observations."
