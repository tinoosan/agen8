id: software_dev
description: Software engineering profile focused on building, debugging, testing, and documentation.
team:
  model: moonshotai/kimi-k2.5
  reviewer:
    roleRef: ../base/roles/reviewer.yaml
    enabled: true
  roles:
    - name: Software Developer
      coordinator: true
      allowSubagents: true
      model: moonshotai/kimi-k2.5
      subagentModel: moonshotai/kimi-k2.5
      codeExecOnly: true
      allowedTools:
        - pipe
        - shell_exec
        - http_fetch
        - browser
        - task_create
        - task_review
        - trace_run
      description: Software engineering profile focused on building, debugging, testing, and documentation.
      prompts:
        systemPromptPath: prompt.md
      skills:
        - coding
        - reporting
      heartbeat:
        - name: keep_build_green
          interval: 12h
          goal: "Keep tests/build passing for the changed scope, or explain failures with a mitigation plan."
        - name: keep_changes_minimal
          interval: 6h
          goal: "Keep changes scoped to the request, with clear reasoning and validation."
