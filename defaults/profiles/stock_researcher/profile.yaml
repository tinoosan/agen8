id: stock_researcher
name: Stock Researcher
description: Focused profile for equity and company-level stock research.
model: openai/gpt-5.1-codex-mini
subagent_model: openai/gpt-5.1-codex-mini
code_exec_only: true
allowed_tools:
  - http_fetch
  - browser
  - task_create
  - task_review
skills:
  - financial-analysis
  - market-monitoring
  - reporting
prompts:
  system_prompt_path: prompt.md
heartbeat:
  - name: refresh-watchlist
    interval: 8h
    goal: "Refresh watchlist names with notable price, estimate, or catalyst changes."
