id: stock_researcher
description: Focused profile for equity and company-level stock research.
team:
  model: moonshotai/kimi-k2.5
  reviewer:
    roleRef: ../base/roles/reviewer.yaml
    enabled: true
  roles:
    - name: Stock Researcher
      coordinator: true
      allowSubagents: true
      model: moonshotai/kimi-k2.5
      subagentModel: moonshotai/kimi-k2.5
      codeExecOnly: true
      allowedTools:
        - pipe
        - http_fetch
        - browser
        - task_create
        - task_review
      description: Focused profile for equity and company-level stock research.
      prompts:
        systemPromptPath: prompt.md
      skills:
        - financial-analysis
        - market-monitoring
        - reporting
      heartbeat:
        - name: refresh-watchlist
          interval: 8h
          goal: "Refresh watchlist names with notable price, estimate, or catalyst changes."
