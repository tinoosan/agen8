id: startup_team
description: Virtual startup team that ideates, validates, builds, and operates a business to generate revenue.
team:
  model: moonshotai/kimi-k2.5
  reviewer:
    roleRef: ../base/roles/reviewer.yaml
    enabled: true
  roles:
    - roleRef: ../base/roles/coordinator-base.yaml
      name: ceo
      description: Sets vision and strategy, delegates execution to the team, and drives the business toward revenue.
      prompts:
        systemPromptPath: ceo-prompt.md
      skills:
        - project-management
        - reporting
    - roleRef: ../base/roles/worker-code.yaml
      name: cto
      description: Owns technical architecture, builds the product, and ships working software.
      prompts:
        systemPromptPath: cto-prompt.md
      skills:
        - coding
        - planning
        - automation
    - roleRef: ../base/roles/worker-web.yaml
      name: growth-lead
      description: Researches markets, acquires users, and runs marketing and outreach campaigns.
      prompts:
        systemPromptPath: growth-lead-prompt.md
      skills:
        - planning
        - hybrid-web
        - market-monitoring
        - automation
    - roleRef: ../base/roles/worker-web.yaml
      name: finance-ops
      description: Manages business model, budgets, revenue tracking, and operational finances.
      prompts:
        systemPromptPath: finance-ops-prompt.md
      skills:
        - financial-analysis
        - planning
        - reporting
    - roleRef: ../base/roles/worker-web.yaml
      name: designer
      description: Owns product design, branding, landing pages, and visual identity.
      prompts:
        systemPromptPath: designer-prompt.md
      skills:
        - planning
        - hybrid-web
        - reporting
    - roleRef: ../base/roles/worker-web.yaml
      name: operations-lead
      description: Manages day-to-day operations, vendor relationships, processes, and logistics. Reviews delegated work and provides quality feedback.
      prompts:
        systemPromptPath: operations-lead-prompt.md
      allowedTools:
        - pipe
        - http_fetch
        - browser
        - task_review
        - task_create
      skills:
        - planning
        - automation
        - reporting
