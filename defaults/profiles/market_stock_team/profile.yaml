id: market_stock_team
description: Multi-role market and stock research team profile.
team:
  model: openai/gpt-5.1-codex-mini
  reviewer:
    enabled: true
    name: reviewer
    description: Dedicated review runtime for team-level batch callback reviews.
    prompts:
      system_prompt: |
        You are the dedicated reviewer for this team.

        Review synthetic batch callback tasks only.
        Decide approve/retry/escalate per item with task_review and provide concise, actionable reasoning.
        After finishing a batch review, hand off to the coordinator via the system handoff task.
    code_exec_only: true
    allowed_tools:
      - task_review
      - task_create
      - fs_list
      - fs_read
      - fs_search
    skills:
      - reviewing
  roles:
    - name: head-analyst
      coordinator: true
      model: openai/gpt-5.1-codex-mini
      subagent_model: openai/gpt-5.1-codex-mini
      code_exec_only: true
      allowed_tools:
        - http_fetch
        - browser
        - task_create
        - task_review
      description: Coordinates tasks, synthesizes findings, and delivers final conclusions.
      prompts:
        system_prompt_path: head-analyst-prompt.md
      skills:
        - project-management
        - reporting
      heartbeat:
        enabled: false
        jobs:
          - name: coordinator-check-in
            interval: 10m
            goal: "Review team task board, unblock stalled work, and delegate next steps to all required roles."
          - name: coordinator-daily-brief
            interval: 24h
            goal: "Produce a consolidated market and stock brief from completed role outputs."

    - name: market-researcher
      model: openai/gpt-5.1-codex-mini
      code_exec_only: true
      allowed_tools:
        - http_fetch
        - browser
      description: Investigates macro themes, sector rotation, and broad market conditions.
      prompts:
        system_prompt_path: market-researcher-prompt.md
      skills:
        - planning
        - market-monitoring
        - hybrid-web

    - name: stock-researcher
      model: openai/gpt-5.1-codex-mini
      code_exec_only: true
      allowed_tools:
        - http_fetch
        - browser
      description: Analyzes company fundamentals, catalysts, and valuation signals.
      prompts:
        system_prompt_path: stock-researcher-prompt.md
      skills:
        - planning
        - financial-analysis
        - market-monitoring

    - name: report-writer
      model: openai/gpt-5.1-codex-mini
      code_exec_only: true
      allowed_tools:
        - http_fetch
      description: Produces concise final reports and executive-ready summaries.
      prompts:
        system_prompt_path: report-writer-prompt.md
      skills:
        - planning
        - reporting

    - name: risk-analyst
      model: openai/gpt-5.1-codex-mini
      code_exec_only: true
      allowed_tools:
        - http_fetch
        - browser
        - task_review
        - task_create
      description: Assesses portfolio risk, correlation exposure, and downside scenarios across positions. Reviews delegated work and provides quality feedback.
      prompts:
        system_prompt_path: risk-analyst-prompt.md
      skills:
        - financial-analysis
        - planning
        - reporting

    - name: quant-researcher
      model: openai/gpt-5.1-codex-mini
      code_exec_only: true
      allowed_tools:
        - shell_exec
        - http_fetch
        - browser
      description: Builds data-driven models, screens for signals, and backtests quantitative strategies.
      prompts:
        system_prompt_path: quant-researcher-prompt.md
      skills:
        - data-engineering
        - planning
        - automation
